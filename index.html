<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;

            height: 40px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #ef4444;
            border-radius: 50%;
            animation: spin 1s linear infinite;

        @keyframes spin {
            0% { transform: rotate(0deg); }

            width: 6px;

        async function loadImage(url, isMeli = false) {
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.onload = () => {
                    if (img.width === 0 || img.height === 0) {
                        console.warn(`Imagem ${url} carregada mas vazia.`);
                        resolve(null);
                        return;
                    }
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    try {
                        const dataURL = canvas.toDataURL(isMeli ? 'image/jpeg' : 'image/png');
                        if (dataURL === 'data:,') {
                            resolve(null);
                        } else {
                            resolve(dataURL);
                        }
                    } catch (e) {
                        console.warn(`Erro ao converter imagem ${url}.`, e);
                        resolve(null);
                    }
                };
                img.onerror = () => {
                    console.warn(`Imagem ${url} não encontrada.`);
                    resolve(null);
                };
                img.src = url;
            });
        }

        let Base64Logo = null;
        let Base64Meli = null;
        let ProcessedItems = [];

        function generateUUID() {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) {
                return crypto.randomUUID();
            }
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        function removeAccents(str) {
            if (!str) return "";
            return str.normalize('NFD').replace(/[\u0300-\u036f]/g, "");
        }

        async function ensureAssetsLoaded() {
            if (Base64Logo === null) {
                const loaded = await loadImage(LOGO_URL, false);
                Base64Logo = loaded || LOGO_BASE64_BACKUP;
            }
            if (Base64Meli === null) {
                Base64Meli = await loadImage(MELI_IMG_URL, true);
            }
        }
        
        ensureAssetsLoaded();

        // --- Funções Globais (Anexadas ao window para o HTML acessar) ---

        window.processData = function() {
            const raw = document.getElementById('bulk-input').value;
            if (!raw.trim()) {
                alert("Cole os dados primeiro.");
                return;
            }
            const lines = raw.trim().split('\n');
            ProcessedItems = [];

            lines.forEach((line) => {
                if (!line.trim() || line.includes("ID Pedido") || line.includes("Nota Fiscal")) return;
                const cols = line.split('\t').map(c => c.trim());
                if (cols.length < 5) return;

                let rawAddress = cols[5] || "";
                rawAddress = rawAddress.replace(/^Endereço de destinatário:\s*/i, "").replace(/^Endereço:\s*/i, "");

                const item = {
                    id: cols[0],
                    nf: cols[1],
                    nome: removeAccents(cols[2]),
                    tel: cols[3],
                    site: cols[4] || "Outros",
                    endereco: removeAccents(rawAddress),
                    produto: removeAccents(cols[6]),
                    base: cols[7],
                    motorista: cols[8] || "Não Informado",
                    dataHora: cols[9],
                    atendente: cols[10] || "Atendente",
                    uuid: generateUUID()
                };

                const safeBase = (item.base || "").replace(/[^a-zA-Z0-9-]/g, ""); 
                const safeMot = (item.motorista || "").replace(/[^a-zA-Z0-9 -]/g, "").toUpperCase(); 
                item.fileName = `${safeBase} - Acareação Motorista - ${safeBase} - ${safeMot} - ${item.id}.pdf`;

                ProcessedItems.push(item);
            });
            renderList();
        }

        function renderList() {
            const container = document.getElementById('list-container');
            const btnUpload = document.getElementById('btn-upload');
            container.innerHTML = '';
            
            if (ProcessedItems.length > 0) {
                document.getElementById('count').innerText = ProcessedItems.length;
                btnUpload.disabled = false;
            }

            if (ProcessedItems.length === 0) {
                container.innerHTML = '<div class="text-center text-slate-400 py-10">Nenhum dado válido encontrado.</div>';
                return;
            }

            ProcessedItems.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded border border-slate-200 hover:shadow-md transition-shadow duration-200 animate-fade-in";
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <div class="overflow-hidden">
                            <span class="font-bold text-slate-800 text-sm block truncate" title="${item.motorista}">${i+1}. ${item.motorista}</span>
                            <span class="text-xs text-slate-500 block truncate" title="${item.fileName}">${item.fileName}</span>
                        </div>
                        <span class="px-2 py-1 bg-red-50 text-red-700 text-xs font-bold rounded border border-red-100 whitespace-nowrap ml-2">${item.site.substring(0, 10)}</span>
                    </div>
                    <div class="grid grid-cols-2 gap-x-2 gap-y-1 text-xs text-slate-600 mb-3 bg-slate-50 p-2 rounded">
                        <p class="truncate" title="${item.id}"><strong>Pedido:</strong> ${item.id}</p>
                        <p class="truncate" title="${item.nf}"><strong>NF:</strong> ${item.nf}</p>
                        <p class="col-span-2 truncate" title="${item.nome}"><strong>Cliente:</strong> ${item.nome}</p>
                    </div>
                    <div class="grid grid-cols-5 gap-2">
                        <button onclick="copyMsgDriver('${item.uuid}')" class="py-1.5 px-2 bg-white border border-slate-300 rounded text-[10px] font-medium text-slate-700 hover:bg-slate-50 hover:text-red-600 transition">Msg Mot.</button>
                        <button onclick="copyOrderData('${item.uuid}')" class="py-1.5 px-2 bg-white border border-slate-300 rounded text-[10px] font-medium text-slate-700 hover:bg-slate-50 hover:text-blue-600 transition">Dados</button>
                        <button onclick="copyMsgClient('${item.uuid}')" class="py-1.5 px-2 bg-white border border-slate-300 rounded text-[10px] font-medium text-slate-700 hover:bg-slate-50 hover:text-red-600 transition">Msg Cli.</button>
                        <button onclick="previewPDF('${item.uuid}')" class="py-1.5 px-2 bg-slate-800 text-white rounded text-[10px] font-medium hover:bg-slate-900 transition">Ver PDF</button>
                        <button onclick="downloadPDF('${item.uuid}')" class="py-1.5 px-2 bg-blue-600 text-white rounded text-[10px] font-medium hover:bg-blue-700 transition flex items-center justify-center gap-1" title="Baixar PDF">

                        </button>
                    </div>
                `;
                container.appendChild(div);

        // --- GERAÇÃO DE PDF ---
        async function createPDFBlob(item) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });
            await ensureAssetsLoaded();
            const siteUpper = (item.site || "").toUpperCase();

            if (siteUpper.includes("MERCADO")) {
                generateMercadoLivreLayout(doc, item);
            } else if (siteUpper.includes("VIA") || siteUpper.includes("CASAS BAHIA") || siteUpper.includes("VAREJO")) {
                generateViaLayout(doc, item);
            } else {
                generateStandardLayout(doc, item);
            }
            return doc.output('blob');
        }

        function generateStandardLayout(doc, item) {
            const pageWidth = doc.internal.pageSize.getWidth(); 
            const pageHeight = doc.internal.pageSize.getHeight(); 
            const margin = 10; 
            const contentWidth = pageWidth - (2 * margin);
            const leftX = margin + 3;
            const maxTextWidth = contentWidth - 6;
            
            let cursorY = 10; 

            doc.setFont("times", "normal");

            // HEADER 
            if (Base64Logo) {
                try {
                    const logoW = 55.0; const logoH = 15.0; 
                    doc.addImage(Base64Logo, 'PNG', (pageWidth - logoW) / 2, cursorY, logoW, logoH);
                    cursorY += logoH + 4; 
                } catch (e) {
                    doc.setFontSize(22); doc.setFont("times", "bold"); doc.setTextColor(220, 0, 0);
                    doc.text("J&T EXPRESS", pageWidth / 2, cursorY + 10, { align: "center" });
                    doc.setTextColor(0); cursorY += 15;
                }
            } else {
                doc.setFontSize(22); doc.setFont("times", "bold"); doc.setTextColor(220, 0, 0);
                doc.text("J&T EXPRESS", pageWidth / 2, cursorY + 10, { align: "center" });
                doc.setTextColor(0); cursorY += 15;
            }

            // TITLE
            doc.setFont("times", "normal");
            doc.setFontSize(22);
            doc.text("Declaração de Acareação", pageWidth / 2, cursorY + 8, { align: "center" });
            const titleW = doc.getTextWidth("Declaração de Acareação");
            doc.setLineWidth(0.5);
            doc.line((pageWidth/2)-(titleW/2), cursorY+9, (pageWidth/2)+(titleW/2), cursorY+9);
            doc.setLineWidth(0.1);
            cursorY += 15; 

            doc.setFontSize(12);
            
            // CAIXA 1: DADOS
            const box1StartY = cursorY;
            let internalY = box1StartY + 6;
            
            doc.setFont("times", "bold");
            doc.text("Dados do consumidor", pageWidth / 2, internalY, { align: "center" });
            internalY += 8;
            doc.setFont("times", "normal");
            
            function renderField(label, value) {
                const text = label + value;
                const lines = doc.splitTextToSize(text, maxTextWidth);
                doc.text(lines, leftX, internalY);
                internalY += (lines.length * 7) + 5; 
            }

            renderField("Nome do titular da compra: ", item.nome);
            renderField("Site no qual a compra foi realizada: ", item.site);
            
            const idDisplay = (item.id && item.nf) ? `${item.id} - ${item.nf}` : (item.id || item.nf || "");
            renderField("ID Pedido: ", idDisplay);
            
            renderField("Nome do produto: ", item.produto);

            const infoLines = doc.splitTextToSize("As informações acima podem ser confirmadas pelo telefone do titular da compra:", maxTextWidth);
            doc.text(infoLines, leftX, internalY);
            internalY += (infoLines.length * 5) + 1; 
            doc.text(`${item.tel}`, leftX, internalY);
            internalY += 6; 

            const box1H = internalY - box1StartY;
            doc.rect(margin, box1StartY, contentWidth, box1H);
            cursorY += box1H; 

            // CAIXA 2: MOTIVO
            const box2StartY = cursorY;
            internalY = box2StartY + 6;

            doc.setFont("times", "bold");
            doc.text("Motivo da Acareação", pageWidth / 2, internalY, { align: "center" });
            internalY += 8;
            doc.setFont("times", "normal");

            const txtM1 = "Destinatário (a) está contestando o recebimento da remessa";
            const linesM1 = doc.splitTextToSize(txtM1, maxTextWidth - 10); 
            doc.rect(leftX, internalY - 4, 4, 4); 
            doc.text(linesM1, leftX + 6, internalY);
            internalY += (linesM1.length * 7) + 2;

            const txtM2 = "Destinatário (a) está contestando o recebimento dos volumes devidamente lacrados e sem sinais de violação.";
            const linesM2 = doc.splitTextToSize(txtM2, maxTextWidth - 10);
            doc.rect(leftX, internalY - 4, 4, 4);
            doc.text(linesM2, leftX + 6, internalY);
            internalY += (linesM2.length * 7) + 2;

            const box2H = internalY - box2StartY;
            doc.rect(margin, box2StartY, contentWidth, box2H);
            cursorY += box2H;

            // CAIXA 3: QUEM RECEBEU
            const box3StartY = cursorY;
            internalY = box3StartY + 8;

            const qText = "Quem recebeu a visita do motorista?";
            const qWidth = doc.getTextWidth(qText);
            doc.text(qText, leftX, internalY);
            
            const chk1X = leftX + qWidth + 5;
            doc.rect(chk1X, internalY - 4, 4, 4);
            doc.text("O destinatário", chk1X + 5, internalY);
            
            const w1 = doc.getTextWidth("O destinatário");
            const chk2X = chk1X + 5 + w1 + 10;

        // --- FIREBASE UPLOAD LÓGICA ---
        // Atualizado para usar setDoc e caminho específico
        window.uploadToPanel = async function() {
            if (!confirm("Confirma o envio para o Firebase?")) return;
            const overlay = document.getElementById('loading-overlay');
            const txt = document.getElementById('loading-text');
            overlay.style.display = 'flex';
            
            try {
                txt.innerText = "Preparando envios...";
                
                const now = Date.now();
                const dateStr = new Date().toISOString().split('T')[0];
                const deadline = now + (24 * 60 * 60 * 1000);

                // Caminho específico solicitado: artifacts/jmsbr-81be4/public/data/acareacoesRelatórios
                
                for (let i = 0; i < ProcessedItems.length; i++) {
                    const item = ProcessedItems[i];
                    txt.innerText = `Gerando PDF e enviando ${i+1}/${ProcessedItems.length}...`;
                    
                    // Gera o Blob do PDF
                    const blob = await createPDFBlob(item);
                    
                    // Converte Blob para Base64
                    const reader = new FileReader();
                    const b64 = await new Promise(resolve => {
                        reader.onloadend = () => resolve(reader.result);
                        reader.readAsDataURL(blob);
                    });

                    // ID único para o documento
                    const docId = generateUUID();

                    const docData = {
                        id: docId,
                        fileName: item.fileName,
                        folderName: dateStr,
                        uploadDate: now,
                        deadline: deadline,
                        status: 'pending',
                        fileURL: b64, // Base64 do PDF
                        whatsappNotified: 'no',
                        valorPedido: 0,
                        valorMulta: 0,
                        motorista: item.motorista,
                        base: item.base,
                        pedidoId: item.id
                    };

                    // Envia para o Firestore usando setDoc no caminho: artifacts/jmsbr-81be4/public/data/acareacoesRelatórios
                    const docRef = doc(db, 'artifacts', 'jmsbr-81be4', 'public', 'data', 'acareacoesRelatórios', docId);
                    await setDoc(docRef, docData);
                }

                alert("Todos os arquivos foram enviados com sucesso para o Firestore!");
                ProcessedItems = [];
                document.getElementById('bulk-input').value = '';
                renderList();

            } catch (err) {
                console.error(err);
                alert("Erro ao enviar: " + err.message);
            } finally {
                overlay.style.display = 'none';
            }
        }

        // --- UTILS ---
        function toTitleCase(str) {
            return str.replace(/\w\S*/g, function(txt){return txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase();});
        }
        function extractDriverName(fullDriverString) {
            let namePart = fullDriverString;
            if (fullDriverString.includes("-")) {
                const parts = fullDriverString.split("-");
                if (parts.length > 1) namePart = parts[1].trim();
            }
            const titleCased = toTitleCase(namePart);
            const nameArr = titleCased.split(" ").filter(n => n.length > 0);
            if (nameArr.length > 1) return `${nameArr[0]} ${nameArr[nameArr.length - 1]}`;
            else if (nameArr.length === 1) return nameArr[0];
            return "Motorista";
        }

        function copyToClipboard(text) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert("Mensagem copiada!");
        }

        window.previewPDF = async function(uuid) {
            const i = ProcessedItems.find(x => x.uuid === uuid);
            if (!i) return;
            const win = window.open("", "_blank");
            if (!win) { alert("Por favor, permita pop-ups para visualizar o PDF."); return; }
            win.document.write("<html><head><title>Gerando PDF...</title></head><body style='display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;'><div><h2>Gerando PDF...</h2><p>Aguarde um momento.</p></div></body></html>");
            try {
                const b = await createPDFBlob(i);
                const url = URL.createObjectURL(b);
                win.location.href = url;
            } catch (err) {
                win.close();
                console.error(err);
                alert("Erro ao gerar PDF: " + err.message);
            }
        }

        window.downloadPDF = async function(uuid) {
            const item = ProcessedItems.find(i => i.uuid === uuid);
            if (!item) return;

            try {
                document.body.style.cursor = 'wait';
                const blob = await createPDFBlob(item);
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = item.fileName;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            } catch (err) {
                console.error(err);
                alert("Erro ao baixar PDF: " + err.message);
            } finally {
                document.body.style.cursor = 'default';
            }
        }
